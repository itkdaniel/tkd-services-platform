openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Shared workspace API — Feature Graph (factory-managed feature databases and a knowledge graph over their entries) and TKD Services (company site content)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meta
    description: Build metadata
  - name: auth
    description: Authentication and session
  - name: tables
    description: Feature database (table) management
  - name: fields
    description: Dynamic field definitions for a table
  - name: entries
    description: Data entries (graph nodes) within a table
  - name: relations
    description: Directed relations between entries (graph edges)
  - name: graph
    description: Knowledge graph queries
  - name: blog
    description: TKD Services blog posts
  - name: contact
    description: TKD Services contact form submissions
  - name: storage
    description: Object storage upload and serving endpoints
  - name: resume
    description: Résumé file uploads, versioning, and admin editing
  - name: projects
    description: Portfolio project showcase entries and sub-app hosting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /build-info:
    get:
      operationId: getBuildInfo
      tags: [meta]
      summary: Build information
      description: Returns version, environment, and build metadata for this deployment
      responses:
        "200":
          description: Build info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentSession
      tags: [auth]
      summary: Get the current session (user or guest)
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"

  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List feature databases (tables)
      responses:
        "200":
          description: Tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureTable"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a new feature database (table) — factory entrypoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureTable"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Table with this slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tables/{tableId}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get a table by id
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureTable"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete a table and its fields, entries, and relations
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tables/{tableId}/fields:
    get:
      operationId: listFields
      tags: [fields]
      summary: List field definitions for a table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureField"
    post:
      operationId: createField
      tags: [fields]
      summary: Add a new field to an existing table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureField"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Table not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tables/{tableId}/entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List entries (nodes) belonging to a table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureEntry"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Add a data entry (graph node) to a table
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Table not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entries/{entryId}:
    get:
      operationId: getEntry
      tags: [entries]
      summary: Get full detail for one entry — used by the graph node detail popup
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEntry
      tags: [entries]
      summary: Delete an entry and its relations
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /relations:
    get:
      operationId: listRelations
      tags: [relations]
      summary: List directed relations between entries
      responses:
        "200":
          description: Relations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityRelation"
    post:
      operationId: createRelation
      tags: [relations]
      summary: Create a directed relation (edge) between two entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityRelation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph:
    get:
      operationId: getGraph
      tags: [graph]
      summary: Fetch nodes and edges for the knowledge graph visualization
      description: Supports free-text search across entry labels and optional filtering by table
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tableId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 500
      responses:
        "200":
          description: Graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /blog/posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts, newest first
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /blog/posts/{postId}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post by id
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post (admin only)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post (admin only)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
        Requires a signed-in user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resume/current:
    get:
      operationId: getCurrentResume
      tags: [resume]
      summary: Get the résumé version currently shown to visitors
      description: Public — usable by guests to render the résumé viewer.
      responses:
        "200":
          description: Current résumé version (or null if none uploaded yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentResumeEnvelope"

  /resume/versions:
    get:
      operationId: listResumeVersions
      tags: [resume]
      summary: List all résumé upload versions, newest first
      description: Requires a signed-in user (owner history view).
      responses:
        "200":
          description: Résumé versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeVersion"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createResumeVersion
      tags: [resume]
      summary: Record a résumé file that was just uploaded to object storage
      description: |
        Called after the file has been uploaded directly to the presigned URL
        from /storage/uploads/request-url. The first version ever created
        automatically becomes current; later uploads require an admin to
        mark them current via PATCH.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeVersionUploadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resume/versions/{versionId}:
    patch:
      operationId: updateResumeVersion
      tags: [resume]
      summary: Edit résumé version metadata or set it as current (admin only)
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeVersionEditInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersion"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /resume/versions/bulk-delete:
    post:
      operationId: bulkDeleteResumeVersions
      tags: [resume]
      summary: Delete one or more résumé versions (uploader or admin only)
      description: |
        Regular users may only delete their own uploads; admins may delete
        any. If the deleted set included the current version, the most
        recently uploaded remaining version is automatically promoted to
        current so the résumé page never goes blank.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeVersionIdsInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionsDeletedEnvelope"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not the uploader and not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List portfolio projects, newest first
      description: Public — usable by guests to render the portfolio grid.
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new portfolio project (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/reorder:
    patch:
      operationId: reorderProjects
      tags: [projects]
      summary: Persist a new display order for the portfolio grid (admin only)
      description: |
        Accepts the full list of project ids in the desired display order.
        Every existing project id must be included exactly once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectReorderInput"
      responses:
        "200":
          description: New order applied
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input — ids must exactly match the existing project ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single portfolio project
      description: Public — usable by guests to render the demo page.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Edit a portfolio project (admin only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a portfolio project and its stored assets (admin only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/subapp-storage:
    get:
      operationId: getProjectSubappStorageUsage
      tags: [projects]
      summary: Current total sub-app storage usage against the configured quota (admin only)
      description: |
        Reports how many bytes of the shared object storage bucket are
        currently occupied by extracted sub-app bundles across all
        projects, and the configured ceiling that new uploads are checked
        against. Lets admins see how close the shared quota is before an
        upload gets rejected.
      responses:
        "200":
          description: Current usage and quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSubappStorageUsage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/subapp:
    post:
      operationId: registerProjectSubapp
      tags: [projects]
      summary: Extract an uploaded .zip archive and serve it as this project's demo sub-app (admin only)
      description: |
        Called after a .zip archive has been uploaded directly to the
        presigned URL from /storage/uploads/request-url. The server verifies
        the upload was issued to the caller, downloads and validates the
        archive (size limits, entry count limits, no path traversal or
        symlinks, must contain an HTML entrypoint), extracts it into a
        project-scoped object storage prefix, and switches the project's
        demo to "subapp".
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSubappUploadInput"
      responses:
        "200":
          description: Sub-app registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Invalid or unsafe archive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only, or upload was not requested by the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeProjectSubapp
      tags: [projects]
      summary: Remove this project's hosted sub-app and its extracted files (admin only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sub-app removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact-messages:
    get:
      operationId: listContactMessages
      tags: [contact]
      summary: List submitted contact messages, newest first (admin only)
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createContactMessage
      tags: [contact]
      summary: Submit the contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /booking/availability:
    get:
      operationId: getBookingAvailability
      tags: [booking]
      summary: List booking slots (open and closed) in a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingAvailability"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /booking/appointments:
    get:
      operationId: listBookingAppointments
      tags: [booking]
      summary: List appointments (admin only)
      parameters:
        - name: upcomingOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingAppointment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createBookingAppointment
      tags: [booking]
      summary: Book an appointment slot (guests or signed-in users)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingAppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingAppointment"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Slot no longer available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /booking/notifications:
    get:
      operationId: listBookingNotifications
      tags: [booking]
      summary: List booking inbox notifications (admin only)
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookingNotification"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /booking/notifications/{id}/read:
    patch:
      operationId: markBookingNotificationRead
      tags: [booking]
      summary: Mark a booking inbox notification as read (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingNotification"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    BuildInfo:
      type: object
      required: [version, environment, buildTime]
      properties:
        version:
          type: string
        environment:
          type: string
        buildTime:
          type: string
        commit:
          type: ["string", "null"]

    UserRole:
      type: string
      enum: [admin, user, guest]

    AuthUser:
      type: object
      required: [id, username, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string

    AuthSession:
      type: object
      required: [user]
      properties:
        user:
          anyOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    RegisterInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 40
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    FeatureTable:
      type: object
      required: [id, name, slug, category, createdBy, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string

    TableInput:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
          minLength: 1

    FieldDataType:
      type: string
      enum: [string, number, boolean, date, json]

    FeatureField:
      type: object
      required: [id, tableId, name, dataType, required, createdAt]
      properties:
        id:
          type: integer
        tableId:
          type: integer
        name:
          type: string
        dataType:
          $ref: "#/components/schemas/FieldDataType"
        description:
          type: ["string", "null"]
        required:
          type: boolean
        createdAt:
          type: string

    FieldInput:
      type: object
      required: [name, dataType]
      properties:
        name:
          type: string
          minLength: 1
        dataType:
          $ref: "#/components/schemas/FieldDataType"
        description:
          type: string
        required:
          type: boolean
          default: false

    FeatureEntry:
      type: object
      required: [id, tableId, label, data, createdAt, updatedAt]
      properties:
        id:
          type: integer
        tableId:
          type: integer
        label:
          type: string
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
        updatedAt:
          type: string

    EntryInput:
      type: object
      required: [label, data]
      properties:
        label:
          type: string
          minLength: 1
        data:
          type: object
          additionalProperties: true

    EntryDetail:
      type: object
      required: [entry, table, outgoing, incoming]
      properties:
        entry:
          $ref: "#/components/schemas/FeatureEntry"
        table:
          $ref: "#/components/schemas/FeatureTable"
        outgoing:
          type: array
          items:
            $ref: "#/components/schemas/EntityRelation"
        incoming:
          type: array
          items:
            $ref: "#/components/schemas/EntityRelation"

    EntityRelation:
      type: object
      required: [id, fromEntryId, toEntryId, relationType, createdAt]
      properties:
        id:
          type: integer
        fromEntryId:
          type: integer
        toEntryId:
          type: integer
        relationType:
          type: string
        weight:
          type: ["number", "null"]
        justification:
          type: ["string", "null"]
        createdAt:
          type: string

    RelationInput:
      type: object
      required: [fromEntryId, toEntryId, relationType]
      properties:
        fromEntryId:
          type: integer
        toEntryId:
          type: integer
        relationType:
          type: string
          minLength: 1
        weight:
          type: number
          minimum: 0
          maximum: 1
        justification:
          type: string

    GraphNode:
      type: object
      required: [id, label, tableId, tableName, category]
      properties:
        id:
          type: integer
        label:
          type: string
        tableId:
          type: integer
        tableName:
          type: string
        category:
          type: string

    GraphEdge:
      type: object
      required: [id, source, target, relationType]
      properties:
        id:
          type: integer
        source:
          type: integer
        target:
          type: integer
        relationType:
          type: string
        weight:
          type: ["number", "null"]
        justification:
          type: ["string", "null"]

    GraphData:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    BlogPost:
      type: object
      required: [id, title, slug, body, authorUsername, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        body:
          type: string
        authorUsername:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    BlogPostInput:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1

    BlogPostUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1

    ContactMessage:
      type: object
      required: [id, name, email, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        message:
          type: string
        createdAt:
          type: string

    ContactMessageInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          minLength: 3
          maxLength: 254
        message:
          type: string
          minLength: 1
          maxLength: 5000

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `application/pdf`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    ResumeVersion:
      type: object
      required:
        [
          id,
          objectPath,
          filename,
          contentType,
          sizeBytes,
          label,
          isCurrent,
          uploaderId,
          uploaderUsername,
          createdAt,
        ]
      properties:
        id:
          type: integer
        objectPath:
          type: string
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        label:
          type: ["string", "null"]
        isCurrent:
          type: boolean
        uploaderId:
          type: integer
        uploaderUsername:
          type: string
        createdAt:
          type: string

    ResumeVersionUploadInput:
      type: object
      required: [objectPath, filename, contentType, sizeBytes]
      properties:
        objectPath:
          type: string
          minLength: 1
        filename:
          type: string
          minLength: 1
        contentType:
          type: string
          minLength: 1
        sizeBytes:
          type: integer
          minimum: 1
        label:
          type: string

    CurrentResumeEnvelope:
      type: object
      required: [current]
      properties:
        current:
          anyOf:
            - $ref: "#/components/schemas/ResumeVersion"
            - type: "null"

    ResumeVersionEditInput:
      type: object
      properties:
        label:
          type: string
        isCurrent:
          type: boolean

    ResumeVersionIdsInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          minItems: 1
          items:
            type: integer

    ResumeVersionsDeletedEnvelope:
      type: object
      required: [deletedIds]
      properties:
        deletedIds:
          type: array
          items:
            type: integer

    Project:
      type: object
      required:
        [
          id,
          slug,
          name,
          description,
          thumbnailObjectPath,
          githubUrl,
          demoType,
          demoUrl,
          subappObjectPrefix,
          subappEntrypoint,
          tags,
          sortOrder,
          ownerId,
          ownerUsername,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        thumbnailObjectPath:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        demoType:
          type: string
          enum: [none, external, subapp]
        demoUrl:
          type: ["string", "null"]
        subappObjectPrefix:
          type: ["string", "null"]
        subappEntrypoint:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
          description: Free-form tags for filtering (e.g. "React", "backend").
        sortOrder:
          type: integer
        ownerId:
          type: integer
        ownerUsername:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    ProjectCreateInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        thumbnailObjectPath:
          type: string
        githubUrl:
          type: string
        demoUrl:
          type: string
        tags:
          type: array
          items:
            type: string
          description: Free-form tags for filtering.

    ProjectUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        thumbnailObjectPath:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        demoUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
          description: Free-form tags for filtering.

    ProjectReorderInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer
          minItems: 1

    ProjectSubappStorageUsage:
      type: object
      required: [usedBytes, quotaBytes]
      properties:
        usedBytes:
          type: integer
          description: Total bytes currently used by extracted sub-app bundles across all projects.
        quotaBytes:
          type: integer
          description: Configured ceiling that new sub-app uploads are checked against.

    ProjectSubappUploadInput:
      type: object
      required: [objectPath, filename, contentType, sizeBytes]
      properties:
        objectPath:
          type: string
          minLength: 1
        filename:
          type: string
          minLength: 1
        contentType:
          type: string
          minLength: 1
        sizeBytes:
          type: integer
          minimum: 1

    BookingSlot:
      type: object
      required: [start, end, available]
      properties:
        start:
          type: string
        end:
          type: string
        available:
          type: boolean

    BookingAvailability:
      type: object
      required: [slots]
      properties:
        slots:
          type: array
          items:
            $ref: "#/components/schemas/BookingSlot"

    BookingAppointmentInput:
      type: object
      required: [title, name, email, start]
      properties:
        title:
          type: string
          minLength: 1
        reason:
          type: string
        name:
          type: string
          minLength: 1
        email:
          type: string
        start:
          type: string

    BookingAppointment:
      type: object
      required: [id, title, reason, guestName, guestEmail, externalUserId, externalUserLabel, start, end, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        reason:
          type: ["string", "null"]
        guestName:
          type: string
        guestEmail:
          type: string
        externalUserId:
          type: ["string", "null"]
        externalUserLabel:
          type: ["string", "null"]
        start:
          type: string
        end:
          type: string
        status:
          type: string
          enum: [confirmed, cancelled]
        createdAt:
          type: string

    BookingNotification:
      type: object
      required: [id, appointmentId, kind, recipient, subject, message, emailSent, read, createdAt]
      properties:
        id:
          type: integer
        appointmentId:
          type: integer
        kind:
          type: string
          enum: [new_booking, reminder_day_before, reminder_hours_before]
        recipient:
          type: string
          enum: [guest, admin]
        subject:
          type: string
        message:
          type: string
        emailSent:
          type: boolean
        read:
          type: boolean
        createdAt:
          type: string
