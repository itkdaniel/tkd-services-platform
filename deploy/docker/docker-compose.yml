# REFERENCE ONLY — not used on Replit. Illustrates how to self-host the API
# server plus a Postgres instance outside of Replit.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feature_graph
      POSTGRES_USER: feature_graph
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api-server
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://feature_graph:change-me@postgres:5432/feature_graph
      SESSION_SECRET: change-me-too
      NODE_ENV: production
      PORT: 8080
      BOOKING_SERVICE_URL: http://booking-service:8000
      BOOKING_SERVICE_API_KEY: change-me-booking-key
    ports:
      - "8080:8080"

  # Standalone booking/appointments microservice — see artifacts/booking-service/README.md.
  # It owns its own schema in the same Postgres instance here for simplicity, but ships with its
  # own Dockerfile/env so it can just as easily point at a different database in another project.
  booking-service:
    build:
      context: ../../artifacts/booking-service
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      BOOKING_DATABASE_URL: postgres://feature_graph:change-me@postgres:5432/feature_graph
      BOOKING_SERVICE_API_KEY: change-me-booking-key
      PORT: 8000
      ADMIN_NOTIFICATION_EMAIL: admin@example.com
      EMAIL_PROVIDER: smtp
      EMAIL_FROM: bookings@example.com
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: change-me
      SMTP_PASS: change-me
    ports:
      - "8000:8000"

volumes:
  pgdata:
