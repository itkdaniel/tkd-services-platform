# This is a copy of the workflow that is actually active at
# .github/workflows/ci.yml, kept here for reference (e.g. for anyone
# forking/mirroring this repo who stripped .github/ and wants a starting
# point). Replit itself does not run GitHub Actions; this file is not
# exercised inside the Repl.
#
# The live version also runs the api-server and booking-service test suites
# with coverage — see .github/workflows/ci.yml for the full workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build
