name: Release

# Cuts a tagged release build on demand. Triggers automatically when a
# `v*` tag is pushed (see "Cutting a release" in the root README for the
# step-by-step version-bump process), or can be run manually from the
# Actions tab for a dry run against any branch/tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tkd_services_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      postgres-booking:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tkd_booking_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tkd_services_test
      SESSION_SECRET: ci-test-session-secret
      BOOKING_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/tkd_booking_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run build

      - name: Push DB schemas
        run: |
          pnpm --filter @workspace/db run push
          pnpm --filter @workspace/booking-service run db:push

      - name: Create sessions table
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d tkd_services_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS sessions (
            sid varchar NOT NULL COLLATE "default",
            sess json NOT NULL,
            expire timestamp(6) NOT NULL
          ) WITH (OIDS=FALSE);
          ALTER TABLE sessions DROP CONSTRAINT IF EXISTS session_pkey;
          ALTER TABLE sessions ADD CONSTRAINT session_pkey PRIMARY KEY (sid);
          CREATE INDEX IF NOT EXISTS idx_session_expire ON sessions (expire);
          SQL

      - name: Run test suites
        run: |
          pnpm --filter @workspace/api-server run test:coverage
          pnpm --filter @workspace/booking-service run test:coverage

      - name: Package build output
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/api-server-dist.tar.gz -C artifacts/api-server dist
          tar -czf release-artifacts/tkd-services-dist.tar.gz -C artifacts/tkd-services dist
          tar -czf release-artifacts/booking-service-dist.tar.gz -C artifacts/booking-service dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: release-artifacts/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
